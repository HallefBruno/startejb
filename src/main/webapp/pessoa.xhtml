
<!DOCTYPE html>
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui">

  <h:head>
    <title>Cadastro de Pessoa</title>
  </h:head>

  <h:body>
    <h:form id="formPessoa">
      <p:messages id="messages" showDetail="true" closable="true" />

      <p:panel header="Dados Básicos">
        <h:panelGrid columns="2" cellpadding="5">
          <p:outputLabel for="nome" value="Nome:" />
          <p:inputText id="nome" value="#{pessoaBean.pessoa.nome}" required="true" />
        </h:panelGrid>
      </p:panel>

      <p:panel header="Telefones" style="margin-top: 10px">
        <h:panelGrid columns="3" cellpadding="5">
          <p:outputLabel for="numero" value="Número:" />
          <p:inputMask id="numero" value="#{pessoaBean.novoTelefone.numero}" mask="(99) 99999-9999" />
          <p:commandButton value="Adicionar" action="#{pessoaBean.adicionarTelefone}" update="tabelaTelefones numero" process="@this numero" />
        </h:panelGrid>

        <p:dataTable id="tabelaTelefones" value="#{pessoaBean.pessoa.telefones}" var="tel" emptyMessage="Nenhum telefone adicionado" style="margin-top: 10px">
          <p:column headerText="Número">
            <h:outputText value="#{tel.numero}" />
          </p:column>
        </p:dataTable>
      </p:panel>
      <p:commandButton value="Salvar Tudo" action="#{pessoaBean.salvar}"  update="formPessoa" style="margin-top: 20px" icon="pi pi-check" />
    </h:form>
  </h:body>
</html>
